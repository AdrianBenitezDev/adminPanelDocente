<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PanelDocente | Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="layout">
    <section class="hero">
      <p class="chip">PanelDocente</p>
      <h1>Panel de Administrador</h1>
      <p class="subtitle">Gestiona usuarios, estado de acceso y estado de pago desde un solo lugar.</p>
    </section>

    <section class="toolbar">
      <label for="adminKey">Clave admin (si aplica)</label>
      <input id="adminKey" type="password" placeholder="x-admin-key" autocomplete="off" />
      <button id="saveKeyBtn" type="button">Guardar clave</button>
      <button id="reloadBtn" type="button">Recargar usuarios</button>
      <small id="status">Cargando...</small>
    </section>

    <section class="filters-card">
      <input id="searchInput" type="search" placeholder="Buscar por email o nombre" autocomplete="off" />
      <select id="paymentFilter">
        <option value="all">Todos los pagos</option>
        <option value="active">Activos</option>
        <option value="pending">Pendientes</option>
        <option value="overdue">Vencidos</option>
        <option value="canceled">Cancelados</option>
        <option value="unknown">Sin datos</option>
      </select>
      <select id="userFilter">
        <option value="all">Todos los usuarios</option>
        <option value="enabled">Habilitados</option>
        <option value="disabled">Deshabilitados</option>
      </select>
    </section>

    <section class="table-card">
      <div class="table-header">
        <h2>Usuarios</h2>
        <p id="totals">Mostrando 0 de 0</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Nombre</th>
              <th>Usuario</th>
              <th>Pago</th>
              <th>Proximo pago</th>
              <th>Ultimo acceso</th>
              <th>Acciones</th>
              <th>Detalle</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="detailDialog">
    <article class="dialog-content">
      <header>
        <h3>Detalle de usuario</h3>
        <button id="closeDialogBtn" type="button" class="close-btn">Cerrar</button>
      </header>
      <pre id="detailJson"></pre>
    </article>
  </dialog>

  <script src="/admin.js"></script>
</body>
</html>
